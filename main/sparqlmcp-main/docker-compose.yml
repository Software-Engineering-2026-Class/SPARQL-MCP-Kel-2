version: "3.9"

services:
  backend:
    build: .
    container_name: sparql_mcp_backend
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      DEFAULT_SPARQL_ENDPOINT: "http://fuseki:3030/cskg/sparql"
      FEDERATION_ENDPOINT: "http://fuseki:3030/cskg/sparql"
      FORCE_FEDERATION: "false"
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS}"
    depends_on:
      - fuseki
    restart: unless-stopped

  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    ports:
      - "3030:3030"
    environment:
      ADMIN_PASSWORD: "admin123"
    volumes:
      - fuseki-data:/fuseki
    restart: unless-stopped

volumes:
  fuseki-data:
                      